name: Deploy to GitHub Pages

on:
  push:
    branches: [claude/scraper-results-deploy-p7btf9]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          cp frontend/index.html _site/index.html
          cp frontend/app.js     _site/app.js
          cp frontend/style.css  _site/style.css
          cp resultados_onpe_progresivo.csv _site/resultados_onpe_progresivo.csv

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
